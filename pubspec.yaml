# ============================================================
# pubspec.yaml
# Flutter 프로젝트 설정 및 의존성 패키지 목록
# ============================================================

name: motora_app
description: MOTORA - 자동차 브랜드/모델 탐색 앱 (16개 브랜드 · 48개 모델)
publish_to: 'none'   # pub.dev에 배포하지 않음

version: 1.0.0+1     # 버전명+빌드번호

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  # 상태관리 (간단한 앱이므로 별도 패키지 불필요 - setState 사용)
  # UI 컴포넌트
  google_fonts: ^6.2.1          # 구글 폰트 (Inter, Roboto 등)
  # 부드러운 스크롤
  scrollable_positioned_list: ^0.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # 아이콘 폰트 포함
  fonts:
    - family: CustomIcons
      fonts:
        - asset: assets/fonts/MaterialIcons-Regular.ttf
